<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Market - Senior to Junior</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        .page { display: none; }
        .active-page { display: block; }
        
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background-color: #3498db; color: white; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .back-btn { background-color: #95a5a6; margin-bottom: 20px; font-size: 14px; }
        .back-btn:hover { background-color: #7f8c8d; }
        .delete-btn { background-color: #e74c3c; margin-top: 10px; width: 100%; }
        .delete-btn:hover { background-color: #c0392b; }
        .add-btn { background-color: #2ecc71; display: block; width: 100%; margin-bottom: 20px; padding: 15px; font-size: 18px; }
        .add-btn:hover { background-color: #27ae60; }
        .toggle-btn { background: none; color: #3498db; padding: 0; text-decoration: underline; font-size: 14px; margin-top: 10px; }
        
        form { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        input, textarea { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        
        #items-container, #dashboard-items-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; background: #fafafa; }
        .item-price { font-size: 20px; color: #27ae60; font-weight: bold; }
        .contact-info { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; font-size: 14px; }
        .loading { text-align: center; font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="home-page" class="page active-page">
        <h1>Welcome to Campus Market</h1>
        <p style="text-align: center;">Buy and sell engineering tools safely and easily.</p>
        <div class="btn-group">
            <button onclick="navigate('buyer-page')">I am a Buyer</button>
            <button onclick="checkAuthAndNavigate()">I am a Seller</button>
        </div>
    </div>

    <div id="seller-auth-page" class="page">
        <button class="back-btn" onclick="navigate('home-page')">&larr; Back to Home</button>
        
        <div id="login-section">
            <h2>Seller Login</h2>
            <form id="login-form">
                <input type="email" id="loginEmail" placeholder="College Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" id="loginBtn">Login</button>
            </form>
            <div style="text-align: center;">
                <button class="toggle-btn" onclick="toggleAuth('register')">Don't have an account? Register here.</button>
            </div>
        </div>

        <div id="register-section" style="display: none;">
            <h2>Create Seller Account</h2>
            <form id="register-form">
                <input type="email" id="regEmail" placeholder="College Email" required>
                <input type="password" id="regPassword" placeholder="Create a Password (min 6 chars)" required>
                <button type="submit" id="regBtn" style="background-color: #2ecc71;">Register</button>
            </form>
            <div style="text-align: center;">
                <button class="toggle-btn" onclick="toggleAuth('login')">Already have an account? Login here.</button>
            </div>
        </div>
    </div>

    <div id="seller-dashboard-page" class="page">
        <button class="back-btn" onclick="logout()">&larr; Logout</button>
        <h2>Seller Dashboard</h2>
        <p style="text-align: center; font-size: 14px; color: #666;" id="dashboard-user-email"></p>
        <button class="add-btn" onclick="navigate('seller-form-page')">+ Add New Item</button>
        <h3>My Active Listings</h3>
        <div id="dashboard-items-container"></div>
    </div>

    <div id="seller-form-page" class="page">
        <button class="back-btn" onclick="navigate('seller-dashboard-page')">&larr; Cancel</button>
        <h2>List an Item</h2>
        <form id="seller-form">
            <input type="text" id="sellerName" placeholder="Your Display Name" required>
            <input type="tel" id="sellerPhone" placeholder="WhatsApp / Phone Number" required>
            <input type="text" id="itemName" placeholder="Item Name (e.g., T-Square, Lab Coat)" required>
            <input type="number" id="itemPrice" placeholder="Price (₹)" required>
            <textarea id="itemDesc" rows="4" placeholder="Condition, size, year bought..." required></textarea>
            <button type="submit" id="addItemBtn" style="background-color: #2ecc71;">List Item</button>
        </form>
    </div>

    <div id="buyer-page" class="page">
        <button class="back-btn" onclick="navigate('home-page')">&larr; Back to Home</button>
        <h2>Available Equipment</h2>
        <div id="items-container"></div>
    </div>

</div>

<script>
    // --- 1. INITIALIZE SUPABASE ---
    // PASTE YOUR URL AND KEY HERE:
    const SUPABASE_URL = 'https://imilvyjixmsftptswghz.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltaWx2eWppeG1zZnRwdHN3Z2h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE5NTAsImV4cCI6MjA5MDgxNzk1MH0.nAesLNCfSTgtAAYhmes5YfCG7otNnA1RXuzRowdqAGs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    // --- 2. NAVIGATION & AUTH FLOW ---
    function navigate(pageId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');

        if (pageId === 'buyer-page') loadAllItems();
        if (pageId === 'seller-dashboard-page') loadDashboardItems();
    }

    async function checkAuthAndNavigate() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            document.getElementById('dashboard-user-email').innerText = `Logged in as: ${currentUser.email}`;
            navigate('seller-dashboard-page');
        } else {
            navigate('seller-auth-page');
        }
    }

    function toggleAuth(view) {
        if (view === 'register') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
        } else {
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }
    }

    // --- 3. SUPABASE AUTHENTICATION ---
    
    // Register
    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        btn.disabled = true; btn.innerText = "Registering...";

        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;

        const { data, error } = await supabase.auth.signUp({ email, password });

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("Registration successful! You can now log in.");
            this.reset();
            toggleAuth('login');
        }
        btn.disabled = false; btn.innerText = "Register";
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.innerText = "Logging in...";

        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Error: " + error.message);
        } else {
            currentUser = data.user;
            document.getElementById('dashboard-user-email').innerText = `Logged in as: ${currentUser.email}`;
            this.reset();
            navigate('seller-dashboard-page');
        }
        btn.disabled = false; btn.innerText = "Login";
    });

    // Logout
    async function logout() {
        await supabase.auth.signOut();
        currentUser = null;
        navigate('home-page');
    }

    // --- 4. SUPABASE DATABASE OPERATIONS ---

    // Add Item
    document.getElementById('seller-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('addItemBtn');
        btn.disabled = true; btn.innerText = "Saving...";

        const newItem = {
            seller_email: currentUser.email,
            seller_name: document.getElementById('sellerName').value,
            seller_phone: document.getElementById('sellerPhone').value,
            item_name: document.getElementById('itemName').value,
            item_price: document.getElementById('itemPrice').value,
            item_desc: document.getElementById('itemDesc').value
        };

        const { error } = await supabase.from('items').insert([newItem]);

        if (error) {
            alert("Error adding item: " + error.message);
        } else {
            alert('Item added successfully!');
            this.reset();
            navigate('seller-dashboard-page');
        }
        btn.disabled = false; btn.innerText = "List Item";
    });

    // Load Dashboard Items (Filter by current user)
    async function loadDashboardItems() {
        const container = document.getElementById('dashboard-items-container');
        container.innerHTML = '<p class="loading">Loading your items...</p>'; 

        const { data: items, error } = await supabase
            .from('items')
            .select('*')
            .eq('seller_email', currentUser.email);

        if (error) {
            container.innerHTML = `<p style="color:red;">Error loading items: ${error.message}</p>`;
            return;
        }

        if (items.length === 0) {
            container.innerHTML = '<p>You have no active listings.</p>';
            return;
        }

        container.innerHTML = '';
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <h3>${item.item_name}</h3>
                <div class="item-price">₹${item.item_price}</div>
                <p>${item.item_desc}</p>
                <button class="delete-btn" onclick="deleteItem(${item.id})">Mark as Sold / Delete</button>
            `;
            container.appendChild(card);
        });
    }

    // Delete Item
    async function deleteItem(itemId) {
        if(confirm("Are you sure you want to delete this listing?")) {
            const { error } = await supabase
                .from('items')
                .delete()
                .eq('id', itemId);
                
            if(error) {
                alert("Error deleting item: " + error.message);
            } else {
                loadDashboardItems(); // Refresh the list
            }
        }
    }

    // Load All Items for Buyers
    async function loadAllItems() {
        const container = document.getElementById('items-container');
        container.innerHTML = '<p class="loading">Fetching available items...</p>'; 

        // Fetch all items from Supabase
        const { data: items, error } = await supabase
            .from('items')
            .select('*')
            .order('created_at', { ascending: false }); // Show newest first

        if (error) {
            container.innerHTML = `<p style="color:red;">Error loading items: ${error.message}</p>`;
            return;
        }

        if (items.length === 0) {
            container.innerHTML = '<p>No items available right now. Check back later!</p>';
            return;
        }

        container.innerHTML = '';
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `
                <h3>${item.item_name}</h3>
                <div class="item-price">₹${item.item_price}</div>
                <p>${item.item_desc}</p>
                <div class="contact-info">
                    <strong>Seller:</strong> ${item.seller_name}<br>
                    <strong>Contact:</strong> ${item.seller_phone}
                </div>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
